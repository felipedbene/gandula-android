name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Test & build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Generate debug keystore
        # Gitignored locally; regenerate the standard debug keystore the debug
        # build type signs with so assembleDebug can package an APK in CI.
        run: |
          keytool -genkeypair -v -keystore debug.keystore \
            -storepass android -keypass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Unit + Robolectric tests
        run: ./gradlew testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gandula-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/
          if-no-files-found: ignore
