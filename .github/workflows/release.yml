name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Needed to create the GitHub Release.
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    name: Build signed APK & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Decode upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: printf '%s' "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/upload.jks"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/upload.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk "gandula-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "gandula-${{ github.ref_name }}.apk" \
            --title "Gandula ${{ github.ref_name }}" \
            --generate-notes

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gandula-release-apk
          path: gandula-${{ github.ref_name }}.apk
